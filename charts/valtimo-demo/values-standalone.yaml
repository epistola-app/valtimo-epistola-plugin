# Standalone values — deploys a simple PostgreSQL StatefulSet instead of requiring
# the CloudNativePG operator. Suitable for demo / dev / CI environments.
#
# Usage:
#   helm install demo charts/valtimo-demo -f charts/valtimo-demo/values-standalone.yaml

database:
  type: standalone

# Epistola uses cnpgExisting mode to read from the standalone secret
# (epistola-standalone-app) created by the parent chart.
epistola:
  database:
    type: cnpgExisting
    cnpgExisting:
      secretName: epistola-standalone-app
