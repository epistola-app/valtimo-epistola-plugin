{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "valtimo-demo.keycloak.fullname" . }}
  labels:
    {{- include "valtimo-demo.keycloak.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "valtimo-demo.keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/realm: {{ include (print $.Template.BasePath "/keycloak-realm-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "valtimo-demo.keycloak.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at {{ include "valtimo-demo.keycloak.dbHost" . }}:{{ .Values.keycloak.database.port }}..."
              until nc -z -w2 {{ include "valtimo-demo.keycloak.dbHost" . }} {{ .Values.keycloak.database.port }}; do
                sleep 2
              done
              echo "Database is ready."
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: init-keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          command:
            - sh
            - -c
            - |
              mkdir -p /keycloak-data/import
              cp /realm-source/valtimo-realm.json /keycloak-data/import/
              cp -r /opt/keycloak/lib/quarkus/. /keycloak-lib/
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: realm-config
              mountPath: /realm-source
            - name: keycloak-data
              mountPath: /keycloak-data
            - name: keycloak-lib
              mountPath: /keycloak-lib
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          args:
            - start-dev
            - --import-realm
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.backend.fullname" . }}
                  key: keycloak-admin-password
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ include "valtimo-demo.keycloak.dbHost" . }}:{{ .Values.keycloak.database.port }}/{{ .Values.keycloak.database.name }}?sslmode=require"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.keycloak.dbSecretName" . }}
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.keycloak.dbSecretName" . }}
                  key: password
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data
            - name: keycloak-conf
              mountPath: /opt/keycloak/conf
            - name: keycloak-lib
              mountPath: /opt/keycloak/lib/quarkus
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          {{- with .Values.keycloak.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: realm-config
          configMap:
            name: {{ include "valtimo-demo.keycloak.fullname" . }}-realm
        - name: keycloak-data
          emptyDir: {}
        - name: keycloak-conf
          emptyDir: {}
        - name: keycloak-lib
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
