apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "valtimo-demo.backend.fullname" . }}
  labels:
    {{- include "valtimo-demo.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "valtimo-demo.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.observability.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.observability.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.observability.prometheus.path | quote }}
        {{- if .Values.observability.prometheus.basicAuth }}
        prometheus.io/basic-auth: "true"
        {{- end }}
        {{- end }}
      labels:
        {{- include "valtimo-demo.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.backend.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at {{ include "valtimo-demo.database.host" . }}:{{ include "valtimo-demo.database.port" . }}..."
              until nc -z -w2 {{ include "valtimo-demo.database.host" . }} {{ include "valtimo-demo.database.port" . }}; do
                sleep 2
              done
              echo "Database is ready."
          securityContext:
            {{- toYaml .Values.backend.initSecurityContext | nindent 12 }}
      containers:
        - name: backend
          {{- $tag := include "valtimo-demo.imageTag" (dict "componentTag" .Values.backend.image.tag "global" .Values.global "appVersion" .Chart.AppVersion) }}
          image: "{{ .Values.backend.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            # Spring profile
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.backend.springProfilesActive | quote }}

            # Database
            {{- if or (eq .Values.database.type "cnpg") (eq .Values.database.type "cnpgExisting") }}
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.cnpg.secretName" . }}
                  key: jdbc-uri
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.cnpg.secretName" . }}
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.cnpg.secretName" . }}
                  key: password
            {{- else if eq .Values.database.type "external" }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.database.external.host }}:{{ .Values.database.external.port }}/{{ .Values.database.external.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.database.external.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "database.external.existingSecret is required" .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.secretKey }}
            {{- end }}

            # OAuth2 / Keycloak
            {{- $keycloakInternalUrl := include "valtimo-demo.keycloak.internalUrl" . }}
            {{- $keycloakExternalUrl := include "valtimo-demo.keycloak.externalUrl" . }}
            {{- $keycloakRealm := .Values.backend.keycloak.realm }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKSETURI
              value: "{{ $keycloakInternalUrl }}/realms/{{ $keycloakRealm }}/protocol/openid-connect/certs"
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAKJWT_ISSUERURI
              value: "{{ $keycloakExternalUrl }}/realms/{{ $keycloakRealm }}"
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAKAPI_ISSUERURI
              value: "{{ $keycloakExternalUrl }}/realms/{{ $keycloakRealm }}"
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKJWT_CLIENTID
              value: {{ .Values.backend.keycloak.clientId | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKAPI_CLIENTID
              value: {{ .Values.backend.keycloak.backendClientId | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKAPI_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.secretName" (dict "root" . "credential" .Values.secrets.keycloakClientSecret) }}
                  key: {{ include "valtimo-demo.secretKey" (dict "root" . "credential" .Values.secrets.keycloakClientSecret "chartKey" "keycloak-client-secret") }}

            # Valtimo
            - name: VALTIMO_APP_HOSTNAME
              value: {{ include "valtimo-demo.valtimoAppHostname" . | quote }}
            - name: VALTIMO_PLUGIN_ENCRYPTIONSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.secretName" (dict "root" . "credential" .Values.secrets.pluginEncryptionSecret) }}
                  key: {{ include "valtimo-demo.secretKey" (dict "root" . "credential" .Values.secrets.pluginEncryptionSecret "chartKey" "plugin-encryption-secret") }}

            # Epistola
            - name: EPISTOLA_BASE_URL
              value: {{ include "valtimo-demo.epistola.serviceUrl" . | quote }}

            # Operaton BPMN engine
            - name: OPERATON_BPM_ADMINUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "valtimo-demo.secretName" (dict "root" . "credential" .Values.secrets.operatonAdminPassword) }}
                  key: {{ include "valtimo-demo.secretKey" (dict "root" . "credential" .Values.secrets.operatonAdminPassword "chartKey" "operaton-admin-password") }}

            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- with .Values.backend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
