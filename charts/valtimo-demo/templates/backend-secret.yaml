{{- if not .Values.secrets.existingSecret }}
{{- $needsSecret := false }}
{{- if not .Values.secrets.keycloakClientSecret.secretRef.name }}{{ $needsSecret = true }}{{ end }}
{{- if not .Values.secrets.pluginEncryptionSecret.secretRef.name }}{{ $needsSecret = true }}{{ end }}
{{- if not .Values.secrets.operatonAdminPassword.secretRef.name }}{{ $needsSecret = true }}{{ end }}
{{- if and .Values.keycloak.enabled (not .Values.secrets.keycloakAdminPassword.secretRef.name) }}{{ $needsSecret = true }}{{ end }}
{{- if and (or .Values.epistola.enabled .Values.externalEpistola.url) (not .Values.secrets.epistolaClientSecret.secretRef.name) }}{{ $needsSecret = true }}{{ end }}
{{- if $needsSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valtimo-demo.backend.fullname" . }}
  labels:
    {{- include "valtimo-demo.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.secrets.keycloakClientSecret.secretRef.name }}
  keycloak-client-secret: {{ include "valtimo-demo.keycloakClientSecret.value" . | quote }}
  {{- end }}
  {{- if not .Values.secrets.pluginEncryptionSecret.secretRef.name }}
  plugin-encryption-secret: {{ include "valtimo-demo.pluginEncryptionSecret.value" . | quote }}
  {{- end }}
  {{- if not .Values.secrets.operatonAdminPassword.secretRef.name }}
  operaton-admin-password: {{ include "valtimo-demo.operatonAdminPassword.value" . | quote }}
  {{- end }}
  {{- if and .Values.keycloak.enabled (not .Values.secrets.keycloakAdminPassword.secretRef.name) }}
  keycloak-admin-password: {{ include "valtimo-demo.keycloakAdminPassword.value" . | quote }}
  {{- end }}
  {{- if and (or .Values.epistola.enabled .Values.externalEpistola.url) (not .Values.secrets.epistolaClientSecret.secretRef.name) }}
  epistola-client-secret: {{ include "valtimo-demo.epistolaClientSecret.value" . | quote }}
  {{- end }}
{{- end }}
{{- end }}
