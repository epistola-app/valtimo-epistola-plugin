apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valtimo-demo.frontend.fullname" . }}-nginx
  labels:
    {{- include "valtimo-demo.frontend.labels" . | nindent 4 }}
data:
  config.js: |
    (function(window) {
      window['env'] = window['env'] || {};
      window['env']['swaggerUri'] = '{{ .Values.frontend.env.swaggerUri }}';
      window['env']['mockApiUri'] = '{{ .Values.frontend.env.mockApiUri }}';
      window['env']['apiUri'] = '{{ .Values.frontend.env.apiUri }}';
      window['env']['keycloakUrl'] = '{{ .Values.frontend.env.keycloakUrl | default (include "valtimo-demo.keycloak.externalUrl" .) }}';
      window['env']['keycloakRealm'] = '{{ .Values.frontend.env.keycloakRealm }}';
      window['env']['keycloakClientId'] = '{{ .Values.frontend.env.keycloakClientId }}';
      window['env']['keycloakRedirectUri'] = '{{ include "valtimo-demo.keycloak.redirectUri" . }}';
      window['env']['keycloakLogoutRedirectUri'] = '{{ include "valtimo-demo.keycloak.logoutRedirectUri" . }}';
      window['env']['whiteListedDomain'] = '{{ include "valtimo-demo.whitelistedDomain" . }}';
      window['env']['openZaakCatalogusId'] = '{{ .Values.frontend.env.openZaakCatalogusId }}';
    })(this);
  default.conf: |
    server {
        listen       8080;
        server_name  localhost;

        gzip on;
        gzip_proxied any;
        gzip_buffers 16 8k;
        gzip_types    text/plain application/javascript application/x-javascript text/javascript text/xml text/css;
        gzip_vary on;

        location ~ /(api|management|v3|mock-api) {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://{{ include "valtimo-demo.backend.fullname" . }}:{{ .Values.backend.service.port }};
        }

        location / {
            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html?$args;
        }
    }
