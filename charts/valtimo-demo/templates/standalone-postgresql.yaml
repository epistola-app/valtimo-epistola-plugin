{{- if eq .Values.database.type "standalone" }}
{{- $fullName := include "valtimo-demo.fullname" . -}}
{{- $dbName := printf "%s-standalone-db" $fullName -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $dbName }}
  labels:
    {{- include "valtimo-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  username: {{ .Values.database.standalone.username | quote }}
  password: {{ .Values.database.standalone.password | quote }}
  jdbc-uri: "jdbc:postgresql://{{ $dbName }}:5432/{{ .Values.database.standalone.database }}"
{{- if .Values.epistola.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: epistola-standalone-app
  labels:
    {{- include "valtimo-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  username: {{ .Values.database.standalone.username | quote }}
  password: {{ .Values.database.standalone.password | quote }}
  jdbc-uri: "jdbc:postgresql://{{ $dbName }}:5432/epistola"
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $dbName }}-init
  labels:
    {{- include "valtimo-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    echo "Creating additional databases if they do not exist..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      SELECT 'CREATE DATABASE keycloak'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec
      SELECT 'CREATE DATABASE {{ .Values.database.standalone.database }}'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '{{ .Values.database.standalone.database }}')\gexec
      SELECT 'CREATE DATABASE epistola'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'epistola')\gexec
    EOSQL
    echo "Database initialization complete."
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $dbName }}
  labels:
    {{- include "valtimo-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
  selector:
    app.kubernetes.io/name: {{ $dbName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $dbName }}
  labels:
    {{- include "valtimo-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ $dbName }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $dbName }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $dbName }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
      containers:
        - name: postgresql
          image: "{{ .Values.database.standalone.image.repository }}:{{ .Values.database.standalone.image.tag }}"
          imagePullPolicy: {{ .Values.database.standalone.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgresql
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.standalone.database | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $dbName }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbName }}
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.standalone.username | quote }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.standalone.username | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.database.standalone.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ $dbName }}-init
            defaultMode: 0755
      {{- with .Values.database.standalone.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.database.standalone.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.database.standalone.storage.storageClass }}
        storageClassName: {{ .Values.database.standalone.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.standalone.storage.size }}
{{- end }}
