{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valtimo-demo.keycloak.fullname" . }}-realm
  labels:
    {{- include "valtimo-demo.labels" . | nindent 4 }}
data:
  valtimo-realm.json: |
    {{- $realmName := .Values.backend.keycloak.realm }}
    {{- $keycloakHost := include "valtimo-demo.keycloak.host" . }}
    {
      "realm": {{ $realmName | quote }},
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "defaultRoles": [
        {{ printf "default-roles-%s" $realmName | quote }}
      ],
      "defaultGroups": [
        "valtimo-users"
      ],
      {{- if .Values.keycloak.webAuthn.enabled }}
      {{- $webAuthnRpId := .Values.keycloak.webAuthn.rpId | default $keycloakHost }}
      {{- $passwordlessRpId := .Values.keycloak.webAuthn.passwordlessRpId | default $keycloakHost }}
      "webAuthnPolicyRpEntityName": {{ .Values.keycloak.webAuthn.rpEntityName | quote }},
      "webAuthnPolicyRpId": {{ $webAuthnRpId | quote }},
      "webAuthnPolicySignatureAlgorithms": {{ .Values.keycloak.webAuthn.signatureAlgorithms | toJson }},
      "webAuthnPolicyAttestationConveyancePreference": "none",
      "webAuthnPolicyAuthenticatorAttachment": "not specified",
      "webAuthnPolicyRequireResidentKey": "not specified",
      "webAuthnPolicyUserVerificationRequirement": {{ .Values.keycloak.webAuthn.userVerificationRequirement | default "required" | quote }},
      "webAuthnPolicyAcceptableAaguids": [],
      "webAuthnPolicyCreateTimeout": 0,
      "webAuthnPolicyAvoidSameAuthenticatorRegister": false,
      "webAuthnPolicyPasswordlessRpEntityName": {{ .Values.keycloak.webAuthn.passwordlessRpEntityName | default .Values.keycloak.webAuthn.rpEntityName | quote }},
      "webAuthnPolicyPasswordlessRpId": {{ $passwordlessRpId | quote }},
      "webAuthnPolicyPasswordlessSignatureAlgorithms": {{ .Values.keycloak.webAuthn.passwordlessSignatureAlgorithms | default .Values.keycloak.webAuthn.signatureAlgorithms | toJson }},
      "webAuthnPolicyPasswordlessAttestationConveyancePreference": "none",
      "webAuthnPolicyPasswordlessAuthenticatorAttachment": "not specified",
      "webAuthnPolicyPasswordlessRequireResidentKey": "required",
      "webAuthnPolicyPasswordlessUserVerificationRequirement": {{ .Values.keycloak.webAuthn.passwordlessUserVerificationRequirement | default "required" | quote }},
      "webAuthnPolicyPasswordlessAcceptableAaguids": [],
      "webAuthnPolicyPasswordlessCreateTimeout": 0,
      "webAuthnPolicyPasswordlessAvoidSameAuthenticatorRegister": false,
      {{- end }}
      "roles": {
        "realm": [
          { "name": "ROLE_USER", "description": "User role" },
          { "name": "ROLE_ADMIN", "description": "Admin role" },
          { "name": "ROLE_DEVELOPER", "description": "Developer role" }
        ]
      },
      "groups": [
        {
          "name": "valtimo-users",
          "path": "/valtimo-users",
          "realmRoles": ["ROLE_USER", "ROLE_ADMIN"]
        },
        { "name": "ep_demo-tenant_reader" },
        { "name": "ep_demo-tenant_editor" },
        { "name": "ep_demo-tenant_generator" },
        { "name": "ep_demo-tenant_manager" },
        { "name": "ep_tenant-manager" },
        { "name": "ep_reader" },
        { "name": "ep_editor" },
        { "name": "ep_generator" },
        { "name": "ep_manager" }
      ],
      "users": [
        {
          "username": "service-account-valtimo-backend",
          "enabled": true,
          "serviceAccountClientId": {{ .Values.backend.keycloak.backendClientId | quote }},
          "clientRoles": {
            "realm-management": [
              "view-users",
              "query-users",
              "manage-users",
              "view-clients",
              "view-realm"
            ]
          }
        },
        {
          "username": "service-account-epistola-suite",
          "enabled": true,
          "serviceAccountClientId": "epistola-suite",
          "clientRoles": {
            "realm-management": [
              "manage-users",
              "view-users",
              "query-users"
            ]
          }
        }
      ],
      "clients": [
        {
          "clientId": {{ .Values.backend.keycloak.clientId | quote }},
          "name": "Valtimo Console",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          {{- $baseUrl := include "valtimo-demo.appBaseUrl" . }}
          {{- $defaultRedirectUris := list (printf "%s/*" $baseUrl) }}
          {{- $defaultWebOrigins := list $baseUrl }}
          "redirectUris": {{ .Values.keycloakRealm.redirectUris | default $defaultRedirectUris | toJson }},
          "webOrigins": {{ .Values.keycloakRealm.webOrigins | default $defaultWebOrigins | toJson }},
          "defaultClientScopes": [
            "web-origins",
            "profile",
            "roles",
            "email"
          ]
        },
        {
          "clientId": {{ .Values.backend.keycloak.backendClientId | quote }},
          "name": "Valtimo Backend",
          "enabled": true,
          "publicClient": false,
          "bearerOnly": false,
          "standardFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "secret": {{ .Values.backend.keycloak.backendClientSecret | quote }}
        }
        {{- if or .Values.epistola.enabled .Values.externalEpistola.url }}
        {{- $epistolaBaseUrl := "" }}
        {{- $epistolaClientSecret := "" }}
        {{- if .Values.epistola.enabled }}
        {{- if .Values.publicUrls.epistola }}
        {{- $epistolaBaseUrl = trimSuffix "/" .Values.publicUrls.epistola }}
        {{- else }}
        {{- $epistolaBaseUrl = printf "http://%s-epistola:%v" .Release.Name (.Values.epistola.service.port | default 8080) }}
        {{- end }}
        {{- $epistolaClientSecret = .Values.epistola.keycloak.clientSecret | default "epistola-dev-secret" }}
        {{- else }}
        {{- $epistolaBaseUrl = .Values.externalEpistola.publicUrl }}
        {{- $epistolaClientSecret = .Values.externalEpistola.clientSecret | default "epistola-dev-secret" }}
        {{- end }}
        ,{
          "clientId": "epistola-suite",
          "name": "Epistola Suite",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": {{ $epistolaClientSecret | quote }},
          "redirectUris": [{{ printf "%s/*" $epistolaBaseUrl | quote }}],
          "webOrigins": [{{ $epistolaBaseUrl | quote }}],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "attributes": {
            "post.logout.redirect.uris": {{ printf "%s/*" $epistolaBaseUrl | quote }}
          },
          "defaultClientScopes": [
            "web-origins", "profile", "roles", "email", "openid"
          ],
          "protocolMappers": [
            {
              "name": "group-membership-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
        {{- end }}
      ],
      {{- if .Values.keycloak.webAuthn.enabled }}
      "requiredActions": [
        {
          "alias": "webauthn-register",
          "name": "WebAuthn Register",
          "providerId": "webauthn-register",
          "enabled": true,
          "defaultAction": false,
          "priority": 60,
          "config": {}
        },
        {
          "alias": "webauthn-register-passwordless",
          "name": "WebAuthn Passwordless Register",
          "providerId": "webauthn-register-passwordless",
          "enabled": true,
          "defaultAction": false,
          "priority": 65,
          "config": {}
        }
      ],
      "authenticationFlows": [
        {
          "alias": "browser-with-passkeys",
          "description": "Browser login with password or passkeys",
          "providerId": "basic-flow",
          "topLevel": true,
          "builtIn": false,
          "authenticationExecutions": [
            { "authenticator": "auth-cookie", "requirement": "ALTERNATIVE", "priority": 0, "authenticatorFlow": false, "userSetupAllowed": false },
            { "authenticator": "auth-spnego", "requirement": "DISABLED", "priority": 1, "authenticatorFlow": false, "userSetupAllowed": false },
            { "authenticator": "identity-provider-redirector", "requirement": "ALTERNATIVE", "priority": 2, "authenticatorFlow": false, "userSetupAllowed": false },
            { "authenticator": "webauthn-authenticator", "requirement": "ALTERNATIVE", "priority": 3, "authenticatorFlow": false, "userSetupAllowed": false },
            { "authenticator": "webauthn-passwordless-authenticator", "requirement": "ALTERNATIVE", "priority": 4, "authenticatorFlow": false, "userSetupAllowed": false },
            { "authenticatorFlow": true, "flowAlias": "browser-forms", "requirement": "REQUIRED", "priority": 5, "userSetupAllowed": false }
          ]
        },
        {
          "alias": "browser-forms",
          "description": "Username/password with optional OTP",
          "providerId": "basic-flow",
          "topLevel": false,
          "builtIn": false,
          "authenticationExecutions": [
            { "authenticator": "username-password-form", "requirement": "REQUIRED", "priority": 0, "authenticatorFlow": false, "userSetupAllowed": false },
            { "authenticator": "conditional-otp-form", "requirement": "CONDITIONAL", "priority": 1, "authenticatorFlow": false, "userSetupAllowed": false }
          ]
        }
      ],
      "browserFlow": "browser-with-passkeys",
      {{- end }}
      "defaultDefaultClientScopes": [
        "role_list",
        "profile",
        "email",
        "roles",
        "web-origins"
      ]
    }
{{- end }}
