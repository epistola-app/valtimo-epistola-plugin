# -- Valtimo Epistola Demo Chart --
# Deploys the Valtimo BPM demo app with Epistola plugin, Keycloak, and PostgreSQL.

# =============================================================================
# Global settings
# =============================================================================
global:
  # Image tag shared by backend and frontend. Per-component image.tag overrides this.
  # Defaults to Chart.appVersion when empty.
  imageTag: ""

# =============================================================================
# Backend (Valtimo Spring Boot application)
# =============================================================================
backend:
  replicaCount: 1

  image:
    repository: ghcr.io/epistola-app/valtimo/demo-backend
    pullPolicy: IfNotPresent
    tag: ""  # defaults to Chart.appVersion
    pullSecrets: []

  springProfilesActive: "demo,dev"

  service:
    type: ClusterIP
    port: 8080

  # Keycloak settings used by the backend for OAuth2
  keycloak:
    realm: valtimo
    clientId: valtimo-console
    backendClientId: valtimo-backend
    backendClientSecret: "6ef6ca16-6b86-482a-a3d9-0561704c1db9"

  # Valtimo-specific configuration
  valtimo:
    appHostname: "localhost:8080"
    pluginEncryptionSecret: "0123456789abcdef0123456789abcdef"

  # Operaton BPMN engine
  operaton:
    adminPassword: "admin"

  # RabbitMQ (disabled by default; autoconfigure is excluded in application.yml)
  rabbitmq:
    enabled: false
    host: "localhost"
    port: "5672"
    username: "guest"
    password: "guest"

  # Additional environment variables for the backend container
  extraEnv: []
  #  - name: SOME_VAR
  #    value: "some-value"

  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10

  resources: {}
  #  requests:
  #    cpu: 500m
  #    memory: 1Gi
  #  limits:
  #    memory: 2Gi

  nodeSelector: {}
  tolerations: []

# =============================================================================
# Frontend (Valtimo Angular app served via nginx)
# =============================================================================
frontend:
  replicaCount: 1

  image:
    repository: ghcr.io/epistola-app/valtimo/demo-frontend
    pullPolicy: IfNotPresent
    tag: ""  # defaults to Chart.appVersion
    pullSecrets: []

  service:
    type: ClusterIP
    port: 8080

  # Environment variables injected via envsubst into config.template.js
  env:
    swaggerUri: "/swagger-ui.html"
    mockApiUri: "/mock-api"
    apiUri: "/api"
    # keycloakUrl is auto-derived from keycloak subchart; override here if needed
    keycloakUrl: ""
    keycloakRealm: "valtimo"
    keycloakClientId: "valtimo-console"
    # Auto-derived from ingress host or backend.valtimo.appHostname; override to set explicitly
    keycloakRedirectUri: ""
    keycloakLogoutRedirectUri: ""
    whitelistedDomain: ""
    openZaakCatalogusId: ""

  # Additional environment variables for the frontend container
  extraEnv: []

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

  resources: {}
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Observability
# =============================================================================
observability:
  prometheus:
    enabled: false
    port: 8080
    path: /actuator/prometheus
    basicAuth: false

# =============================================================================
# Keycloak realm import configuration
# =============================================================================
keycloakRealm:
  # Redirect URIs for the valtimo-console client.
  # Auto-derived from ingress host or backend.valtimo.appHostname when empty.
  redirectUris: []
  # Web origins for CORS.
  # Auto-derived from ingress host or backend.valtimo.appHostname when empty.
  webOrigins: []

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: false
  className: ""
  annotations: {}
  #  nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: valtimo-demo.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /auth
          pathType: Prefix
          service: keycloak
  tls: []
  #  - secretName: valtimo-demo-tls
  #    hosts:
  #      - valtimo-demo.local

# =============================================================================
# External services (used when subcharts are disabled)
# =============================================================================
externalKeycloak:
  # Internal Keycloak URL (for backend-to-keycloak in-cluster communication)
  url: ""
  # External Keycloak URL (for browser access; falls back to url if empty)
  frontendUrl: ""

externalEpistola:
  # URL of an external Epistola instance (must include the /api path suffix)
  # Example: http://epistola.my-namespace.svc.cluster.local:8080/api
  url: ""

# =============================================================================
# Subchart: Epistola
# =============================================================================
epistola:
  enabled: true
  # Override epistola values here, e.g.:
  # service:
  #   port: 8080
  # database:
  #   type: external
  #   external:
  #     host: my-epistola-db
  #
  # For standalone mode, use values-standalone.yaml or set:
  #   database:
  #     type: cnpgExisting
  #     cnpgExisting:
  #       secretName: epistola-standalone-app

# =============================================================================
# Database (Valtimo PostgreSQL)
# =============================================================================
database:
  # Options: cnpg, cnpgExisting, external, standalone
  type: "cnpg"

  # Create a new CNPG Cluster (type: cnpg)
  cnpg:
    name: valtimo-db
    instances: 1
    postgresVersion: 17
    database: valtimo
    owner: valtimo
    storage:
      size: 2Gi
      storageClass: ""
    resources: {}
    parameters: {}

  # Use existing CNPG Cluster (type: cnpgExisting)
  cnpgExisting:
    clusterName: ""       # required
    secretName: ""        # defaults to "{clusterName}-app"

  # External PostgreSQL (type: external)
  external:
    host: ""
    port: 5432
    database: valtimo
    username: valtimo
    existingSecret: ""    # required — secret containing password
    secretKey: password

  # Standalone single-node PostgreSQL (type: standalone)
  # Simple StatefulSet — no CNPG operator required. For demo/dev only.
  standalone:
    image:
      repository: postgres
      tag: "17-alpine"
      pullPolicy: IfNotPresent
    database: valtimo
    username: valtimo
    password: "changeme"
    storage:
      size: 2Gi
      storageClass: ""
    resources: {}
    nodeSelector: {}
    tolerations: []

# =============================================================================
# Keycloak (standalone deployment — no subchart)
# =============================================================================
keycloak:
  enabled: true

  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.1"
    pullPolicy: IfNotPresent

  adminUser: admin
  adminPassword: admin

  service:
    type: ClusterIP
    port: 80

  # Database (uses CNPG shared cluster by default)
  database:
    host: ""      # auto-derived from CNPG cluster name when empty
    port: 5432
    name: keycloak
    existingSecret: ""  # auto-derived from CNPG secret name when empty

  resources: {}
  nodeSelector: {}
  tolerations: []
