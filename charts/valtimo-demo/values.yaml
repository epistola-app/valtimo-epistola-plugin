# -- Valtimo Epistola Demo Chart --
# Deploys the Valtimo BPM demo app with Epistola plugin, Keycloak, and PostgreSQL.

# =============================================================================
# Global settings
# =============================================================================
global:
  # Image tag shared by backend and frontend. Per-component image.tag overrides this.
  # Defaults to Chart.appVersion when empty.
  imageTag: ""

# =============================================================================
# Public URLs (used for redirect URIs and browser access)
# =============================================================================
publicUrls:
  # Fully-qualified frontend URL (e.g. https://valtimo.example.com). When empty,
  # falls back to ingress host or http://<backend.valtimo.appHostname>.
  frontend: ""
  # Fully-qualified backend URL (used for documentation links). Optional.
  backend: ""
  # Fully-qualified Keycloak URL (e.g. https://auth.example.com/auth). When
  # empty, falls back to ingress host or the in-cluster service URL.
  keycloak: ""
  # Fully-qualified Epistola URL (e.g. https://epistola.example.com). When empty,
  # falls back to the in-cluster service URL. Used for Keycloak redirect URIs.
  epistola: ""

# =============================================================================
# Secrets
# =============================================================================
secrets:
  # Each credential supports two modes:
  #   value:     Plain text value. Auto-generated when empty. Stored in the chart-managed Secret.
  #   secretRef: Reference an existing K8s Secret. Takes precedence over value.
  #
  # When secretRef.name is set for a credential, that credential is read directly
  # from the referenced Secret and is NOT included in the chart-managed Secret.
  # This allows sharing secrets across apps (e.g. a Keycloak client secret used
  # by both valtimo-demo and epistola).
  #
  # Legacy: set existingSecret to reference a single Secret for ALL credentials.
  existingSecret: ""

  keycloakClientSecret:
    value: ""                # auto-generated (40 chars) when empty
    secretRef:
      name: ""
      key: "client-secret"

  pluginEncryptionSecret:
    value: ""                # auto-generated (32 chars) when empty
    secretRef:
      name: ""
      key: "plugin-encryption-secret"

  operatonAdminPassword:
    value: ""                # auto-generated (24 chars) when empty
    secretRef:
      name: ""
      key: "password"

  keycloakAdminPassword:
    value: ""                # auto-generated (32 chars) when empty
    secretRef:
      name: ""
      key: "keycloak-admin-password"

  epistolaClientSecret:
    value: ""                # auto-generated (40 chars) when empty
    secretRef:
      name: ""
      key: "client-secret"

# =============================================================================
# Backend (Valtimo Spring Boot application)
# =============================================================================
backend:
  replicaCount: 1

  image:
    repository: ghcr.io/epistola-app/valtimo/demo-backend
    pullPolicy: IfNotPresent
    tag: ""  # defaults to Chart.appVersion
    pullSecrets: []

  springProfilesActive: ""

  service:
    type: ClusterIP
    port: 8080

  # Keycloak settings used by the backend for OAuth2
  keycloak:
    realm: valtimo
    clientId: valtimo-console
    backendClientId: valtimo-backend

  # Valtimo-specific configuration
  valtimo:
    # Hostname used by backend to construct absolute URLs when ingress/publicUrl
    # is not provided.
    appHostname: "localhost:8080"

  # Additional environment variables for the backend container
  extraEnv: []
  #  - name: SOME_VAR
  #    value: "some-value"

  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  initSecurityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  resources: {}
  #  requests:
  #    cpu: 500m
  #    memory: 1Gi
  #  limits:
  #    memory: 2Gi

  nodeSelector: {}
  tolerations: []

# =============================================================================
# Frontend (Valtimo Angular app served via nginx)
# =============================================================================
frontend:
  replicaCount: 1

  image:
    repository: ghcr.io/epistola-app/valtimo/demo-frontend
    pullPolicy: IfNotPresent
    tag: ""  # defaults to Chart.appVersion
    pullSecrets: []

  service:
    type: ClusterIP
    port: 8080

  # Environment variables injected via envsubst into config.template.js
  env:
    swaggerUri: "/swagger-ui.html"
    mockApiUri: "/mock-api"
    apiUri: "/api"
    # keycloakUrl is auto-derived from keycloak subchart; override here if needed
    keycloakUrl: ""
    keycloakRealm: "valtimo"
    keycloakClientId: "valtimo-console"
    # Auto-derived from ingress host or backend.valtimo.appHostname; override to set explicitly
    keycloakRedirectUri: ""
    keycloakLogoutRedirectUri: ""
    whitelistedDomain: ""
    openZaakCatalogusId: ""

  # Additional environment variables for the frontend container
  extraEnv: []

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  resources: {}
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Observability
# =============================================================================
observability:
  prometheus:
    enabled: false
    port: 8080
    path: /actuator/prometheus
    basicAuth: false

# =============================================================================
# Keycloak realm import configuration
# =============================================================================
keycloakRealm:
  # Redirect URIs for the valtimo-console client.
  # Auto-derived from ingress host or backend.valtimo.appHostname when empty.
  redirectUris: []
  # Web origins for CORS.
  # Auto-derived from ingress host or backend.valtimo.appHostname when empty.
  webOrigins: []

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: false
  className: ""
  annotations: {}
  #  nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: valtimo-demo.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /auth
          pathType: Prefix
          service: keycloak
  tls: []
  #  - secretName: valtimo-demo-tls
  #    hosts:
  #      - valtimo-demo.local

# =============================================================================
# External services (used when subcharts are disabled)
# =============================================================================
externalKeycloak:
  # Internal Keycloak URL (for backend-to-keycloak in-cluster communication)
  url: ""
  # External Keycloak URL (for browser access; falls back to url if empty)
  frontendUrl: ""

externalEpistola:
  # URL of an external Epistola instance (must include the /api path suffix)
  # Example: http://epistola.my-namespace.svc.cluster.local:8080/api
  url: ""
  # Browser-facing URL for Keycloak redirect URIs (used when epistola subchart is disabled)
  publicUrl: ""
  # Note: the Epistola client secret is managed via secrets.epistolaClientSecret
  # or secrets.existingSecret (key: epistola-client-secret), NOT here.

# =============================================================================
# Subchart: Epistola
# =============================================================================
epistola:
  enabled: true

  # Override epistola subchart values here, e.g.:
  # service:
  #   port: 8080
  # database:
  #   type: external
  #   external:
  #     host: my-epistola-db
  #
  # When using external database mode in the parent chart, configure
  # Epistola to point to its own database secret:
  #   database:
  #     type: cnpgExisting
  #     cnpgExisting:
  #       secretName: postgresql-epistola

# =============================================================================
# Database (Valtimo PostgreSQL)
# =============================================================================
database:
  # Options: cnpg, cnpgExisting, external
  type: "cnpg"

  # Create a new CNPG Cluster (type: cnpg)
  cnpg:
    name: valtimo-db
    instances: 1
    postgresVersion: 17
    database: valtimo
    owner: valtimo
    storage:
      size: 2Gi
      storageClass: ""
    resources: {}
    parameters: {}

  # Use existing CNPG Cluster (type: cnpgExisting)
  cnpgExisting:
    clusterName: ""       # required
    secretName: ""        # defaults to "{clusterName}-app"

  # External PostgreSQL (type: external)
  external:
    host: ""
    port: 5432
    database: valtimo
    username: valtimo
    existingSecret: ""    # required — secret containing password
    secretKey: password


# =============================================================================
# Keycloak (standalone deployment — no subchart)
# =============================================================================
keycloak:
  enabled: true

  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.1"
    pullPolicy: IfNotPresent

  adminUser: admin

  webAuthn:
    enabled: false
    rpEntityName: "Valtimo Demo"
    rpId: ""
    passwordlessRpEntityName: "Valtimo Demo"
    passwordlessRpId: ""
    signatureAlgorithms:
      - "ES256"
      - "RS256"
    passwordlessSignatureAlgorithms: []
    userVerificationRequirement: "required"
    passwordlessUserVerificationRequirement: "required"

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  initSecurityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # Security context for the init-keycloak container. Needs readOnlyRootFilesystem: false
  # because kc.sh build writes JARs to /opt/keycloak/lib/.
  initKeycloakSecurityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  service:
    type: ClusterIP
    port: 80

  # Database (uses CNPG shared cluster by default)
  database:
    host: ""      # auto-derived from CNPG cluster name when empty
    port: 5432
    name: keycloak
    existingSecret: ""  # auto-derived from CNPG secret name when empty

  resources: {}
  nodeSelector: {}
  tolerations: []
