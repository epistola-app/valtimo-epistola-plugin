version: 1
metadata:
  name: Valtimo Demo OIDC
  labels:
    blueprints.goauthentik.io/instantiate: "true"
    blueprints.goauthentik.io/description: |
      Local Valtimo demo OAuth2/OIDC provider, application, role mappings, and demo users.
entries:
  - id: valtimo-role-user
    model: authentik_core.group
    identifiers:
      name: ROLE_USER
    attrs:
      attributes:
        description: Valtimo user role

  - id: valtimo-role-admin
    model: authentik_core.group
    identifiers:
      name: ROLE_ADMIN
    attrs:
      attributes:
        description: Valtimo administrator role

  - model: authentik_core.user
    state: created
    identifiers:
      username: viewer@demo.local
    attrs:
      name: Viewer Demo
      email: viewer@demo.local
      is_active: true
      password: viewer
      groups:
        - !Find [authentik_core.group, [name, ROLE_USER]]

  - model: authentik_core.user
    state: created
    identifiers:
      username: admin@demo.local
    attrs:
      name: Admin Demo
      email: admin@demo.local
      is_active: true
      password: admin
      groups:
        - !Find [authentik_core.group, [name, ROLE_USER]]
        - !Find [authentik_core.group, [name, ROLE_ADMIN]]

  - model: authentik_providers_oauth2.scopemapping
    id: valtimo-role-scope
    identifiers:
      name: valtimo-demo-roles
    attrs:
      name: "Valtimo demo roles"
      scope_name: roles
      description: "Keycloak-compatible Valtimo role claims"
      expression: |
        roles = [
            group.name for group in request.user.ak_groups.all()
            if group.name.startswith("ROLE_")
        ]
        return {
            "realm_access": {
                "roles": roles,
            },
            "resource_access": {
                "valtimo-console": {
                    "roles": roles,
                },
            },
        }

  - model: authentik_providers_oauth2.oauth2provider
    id: valtimo-provider
    identifiers:
      name: Valtimo Demo
    attrs:
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf valtimo-role-scope
      client_type: public
      client_id: valtimo-console
      grant_types: [authorization_code, refresh_token]
      include_claims_in_id_token: true
      issuer_mode: per_provider
      sub_mode: user_username
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:4200/auth/callback
        - matching_mode: strict
          url: http://localhost:4200

  - model: authentik_core.application
    identifiers:
      slug: valtimo-demo
    attrs:
      name: Valtimo Demo
      provider: !KeyOf valtimo-provider
      meta_launch_url: http://localhost:4200/?authProvider=authentik
      meta_description: Local Valtimo demo application
