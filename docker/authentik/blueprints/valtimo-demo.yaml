version: 1
metadata:
  name: Valtimo Demo OIDC
  labels:
    blueprints.goauthentik.io/instantiate: "true"
    blueprints.goauthentik.io/description: |
      Local Valtimo demo OAuth2/OIDC provider, application, role mappings, and demo users.
entries:
  - model: authentik_core.group
    id: valtimo-role-user
    identifiers:
      name: ROLE_USER
    attrs:
      attributes:
        description: Valtimo user role

  - model: authentik_core.group
    id: valtimo-role-admin
    identifiers:
      name: ROLE_ADMIN
    attrs:
      attributes:
        description: Valtimo administrator role

  - model: authentik_core.user
    state: created
    identifiers:
      username: viewer@demo
    attrs:
      name: Viewer Demo
      email: viewer@demo
      is_active: true
      password: viewer
      groups:
        - !KeyOf valtimo-role-user

  - model: authentik_core.user
    state: created
    identifiers:
      username: admin@demo
    attrs:
      name: Admin Demo
      email: admin@demo
      is_active: true
      password: admin
      groups:
        - !KeyOf valtimo-role-user
        - !KeyOf valtimo-role-admin

  - model: authentik_providers_oauth2.scopemapping
    id: valtimo-role-scope
    identifiers:
      managed: goauthentik.io/providers/oauth2/scope-valtimo-roles
    attrs:
      name: "Valtimo demo roles"
      scope_name: valtimo_roles
      description: "Keycloak-compatible Valtimo role claims"
      expression: |
        roles = [
            group.name for group in request.user.ak_groups.all()
            if group.name.startswith("ROLE_")
        ]
        return {
            "realm_access": {
                "roles": roles,
            },
            "resource_access": {
                "valtimo-console": {
                    "roles": roles,
                },
            },
        }

  - model: authentik_providers_oauth2.oauth2provider
    id: valtimo-provider
    identifiers:
      name: Valtimo Demo
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !KeyOf valtimo-role-scope
      client_type: public
      client_id: valtimo-console
      include_claims_in_id_token: true
      issuer_mode: per_provider
      sub_mode: user_username
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:4200/auth/callback
        - matching_mode: strict
          url: http://localhost:4200

  - model: authentik_core.application
    identifiers:
      slug: valtimo-demo
    attrs:
      name: Valtimo Demo
      provider: !KeyOf valtimo-provider
      meta_launch_url: http://localhost:4200/?authProvider=authentik
      meta_description: Local Valtimo demo application
