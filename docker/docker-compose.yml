services:
  epistola-server:
    profiles: ["server"]
    image: ghcr.io/epistola-app/epistola-suite:0.17.0
    container_name: epistola-server
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SPRING_DATASOURCE_URL: jdbc:postgresql://epistola-postgres:5432/epistola_suite
      SPRING_DATASOURCE_USERNAME: epistola
      SPRING_DATASOURCE_PASSWORD: epistola
    ports:
      - "4010:4000"
    depends_on:
      epistola-postgres:
        condition: service_healthy

  epistola-mock:
    profiles: ["mock"]
    image: ghcr.io/epistola-app/epistola-contract/mock-server:0.1.13
    container_name: epistola-mock
    ports:
      - "4010:4010"

  epistola-postgres:
    image: postgres:16-alpine
    container_name: epistola-postgres
    environment:
      POSTGRES_USER: epistola
      POSTGRES_PASSWORD: epistola
      POSTGRES_DB: epistola
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epistola"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: epistola-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://epistola-postgres:5432/keycloak
      KC_DB_USERNAME: epistola
      KC_DB_PASSWORD: epistola
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      epistola-postgres:
        condition: service_healthy

  # === Containers profile: run actual container images to reproduce K8s behavior ===

  valtimo-backend:
    profiles: ["containers"]
    image: ghcr.io/epistola-app/valtimo/demo-backend:0.1.1
    platform: linux/amd64
    container_name: valtimo-backend
    environment:
      SPRING_PROFILES_ACTIVE: "demo,dev"
      SPRING_DATASOURCE_URL: jdbc:postgresql://epistola-postgres:5432/valtimo
      SPRING_DATASOURCE_USERNAME: epistola
      SPRING_DATASOURCE_PASSWORD: epistola
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKSETURI: http://keycloak:8080/realms/valtimo/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAKJWT_ISSUERURI: http://keycloak:8080/realms/valtimo
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAKAPI_ISSUERURI: http://keycloak:8080/realms/valtimo
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKJWT_CLIENTID: valtimo-console
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKAPI_CLIENTID: valtimo-backend
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKAPI_CLIENTSECRET: 6ef6ca16-6b86-482a-a3d9-0561704c1db9
      VALTIMO_APP_HOSTNAME: "localhost:4200"
      VALTIMO_PLUGIN_ENCRYPTIONSECRET: "0123456789abcdef0123456789abcdef"
      VALTIMO_SECURITY_WHITELIST_HOSTS_0_: "localhost:4200"
      OPERATON_BPM_ADMINUSER_PASSWORD: admin
      EPISTOLA_BASE_URL: "http://epistola-server:4000/api"
    depends_on:
      epistola-postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  valtimo-frontend:
    profiles: ["containers"]
    image: ghcr.io/epistola-app/valtimo/demo-frontend:0.1.1
    platform: linux/amd64
    container_name: valtimo-frontend
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "4200:8080"
    volumes:
      - ./containers/config.js:/usr/share/nginx/html/assets/config.js:ro
      - ./containers/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - valtimo-backend

  # === Database reset: test the CronJob logic locally ===

  db-reset:
    profiles: ["reset"]
    image: postgres:17-alpine
    container_name: epistola-db-reset
    environment:
      PGHOST: epistola-postgres
      PGPORT: "5432"
      PGUSER: epistola
      PGPASSWORD: epistola
    entrypoint: ["sh", "-ec"]
    command:
      - |
        PROTECTED="keycloak postgres template0 template1"
        DATABASES="valtimo epistola epistola_suite"

        echo "=== Resetting databases ==="
        for DB in $$DATABASES; do
          for P in $$PROTECTED; do
            if [ "$$DB" = "$$P" ]; then
              echo "REFUSING to reset protected database: $$DB"
              exit 1
            fi
          done
          echo "Resetting: $$DB"
          psql -d postgres -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '$$DB' AND pid <> pg_backend_pid();" || true
          psql -d postgres -c "DROP DATABASE IF EXISTS $$DB;"
          psql -d postgres -c "CREATE DATABASE $$DB OWNER \"$$PGUSER\";"
        done
        echo "=== Database reset complete ==="
    depends_on:
      epistola-postgres:
        condition: service_healthy

volumes:
  postgres_data:
