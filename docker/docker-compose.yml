services:
  ved-epistola-server:
    profiles: ["server"]
    image: ghcr.io/epistola-app/epistola-suite:latest
    container_name: ved-epistola-server
    environment:
      SPRING_PROFILES_ACTIVE: demo,localauth
      SPRING_DATASOURCE_URL: jdbc:postgresql://ved-postgres:5432/epistola_suite
      SPRING_DATASOURCE_USERNAME: epistola
      SPRING_DATASOURCE_PASSWORD: epistola
    ports:
      - "4000:4000"
    depends_on:
      ved-postgres:
        condition: service_healthy

  ved-epistola-mock:
    profiles: ["mock"]
    image: ghcr.io/epistola-app/epistola-contract/mock-server:0.2.0
    container_name: ved-epistola-mock
    ports:
      - "4010:4010"

  ved-postgres:
    image: postgres:16-alpine
    container_name: ved-postgres
    environment:
      POSTGRES_USER: epistola
      POSTGRES_PASSWORD: epistola
      POSTGRES_DB: epistola
    ports:
      - "5432:5432"
    volumes:
      - ved_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epistola"]
      interval: 10s
      timeout: 5s
      retries: 5

  ved-keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: ved-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://ved-postgres:5432/keycloak
      KC_DB_USERNAME: epistola
      KC_DB_PASSWORD: epistola
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:z
    depends_on:
      ved-postgres:
        condition: service_healthy

  # === ZGW backend (default = lightweight stateful mock) ===
  # Started by plain `docker compose up`. A tiny, dependency-free, native (arm64/amd64)
  # in-memory fake of the ZGW Documenten + Zaken + Catalogi APIs on :8002 — enough for the
  # Valtimo documentenapi/zakenapi/catalogiapi plugins to run the subsidy demo and surface
  # generated PDFs on the case Documents tab, without PostGIS/Redis/Celery/emulation.
  # For full-fidelity testing against a real OpenZaak, use the `openzaak` profile instead
  # (stop this mock first — both bind :8002). See docker/zgw-fake/README.md.
  ved-zgw-mock:
    image: python:3.12-alpine
    container_name: ved-zgw-mock
    command: ["python", "/srv/server.py"]
    ports:
      - "8002:8002"
    volumes:
      - ./zgw-fake/server.py:/srv/server.py:ro

  # === Containers profile: run actual container images to reproduce K8s behavior ===

  ved-valtimo-backend:
    profiles: ["containers"]
    image: ghcr.io/epistola-app/valtimo/demo-backend:0.1.1
    platform: linux/amd64
    container_name: ved-valtimo-backend
    environment:
      SPRING_PROFILES_ACTIVE: "demo,dev"
      SPRING_DATASOURCE_URL: jdbc:postgresql://ved-postgres:5432/valtimo
      SPRING_DATASOURCE_USERNAME: epistola
      SPRING_DATASOURCE_PASSWORD: epistola
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKSETURI: http://ved-keycloak:8080/realms/valtimo/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAKJWT_ISSUERURI: http://ved-keycloak:8080/realms/valtimo
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAKAPI_ISSUERURI: http://ved-keycloak:8080/realms/valtimo
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKJWT_CLIENTID: valtimo-console
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKAPI_CLIENTID: valtimo-backend
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAKAPI_CLIENTSECRET: 6ef6ca16-6b86-482a-a3d9-0561704c1db9
      VALTIMO_APP_HOSTNAME: "localhost:4200"
      VALTIMO_PLUGIN_ENCRYPTIONSECRET: "0123456789abcdef0123456789abcdef"
      VALTIMO_SECURITY_WHITELIST_HOSTS_0_: "localhost:4200"
      OPERATON_BPM_ADMINUSER_PASSWORD: admin
      EPISTOLA_BASE_URL: "http://ved-epistola-server:4000/api"
    depends_on:
      ved-postgres:
        condition: service_healthy
      ved-keycloak:
        condition: service_started

  ved-valtimo-frontend:
    profiles: ["containers"]
    image: ghcr.io/epistola-app/valtimo/demo-frontend:0.1.1
    platform: linux/amd64
    container_name: ved-valtimo-frontend
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "4200:8080"
    volumes:
      - ./containers/config.js:/usr/share/nginx/html/assets/config.js:ro
      - ./containers/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ved-valtimo-backend

  # === Database reset: test the CronJob logic locally ===

  ved-db-reset:
    profiles: ["reset"]
    image: postgres:17-alpine
    container_name: ved-db-reset
    environment:
      PGHOST: ved-postgres
      PGPORT: "5432"
      PGUSER: epistola
      PGPASSWORD: epistola
    entrypoint: ["sh", "-ec"]
    command:
      - |
        PROTECTED="keycloak postgres template0 template1"
        DATABASES="valtimo epistola epistola_suite"

        echo "=== Resetting databases ==="
        for DB in $$DATABASES; do
          for P in $$PROTECTED; do
            if [ "$$DB" = "$$P" ]; then
              echo "REFUSING to reset protected database: $$DB"
              exit 1
            fi
          done
          echo "Resetting: $$DB"
          psql -d postgres -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '$$DB' AND pid <> pg_backend_pid();" || true
          psql -d postgres -c "DROP DATABASE IF EXISTS $$DB;"
          psql -d postgres -c "CREATE DATABASE $$DB OWNER \"$$PGUSER\";"
        done
        echo "=== Database reset complete ==="
    depends_on:
      ved-postgres:
        condition: service_healthy

  # === `openzaak` profile: the WHOLE real OpenZaak stack (Documenten + Zaken + Catalogi
  # APIs) for full-fidelity ZGW testing. Opt-in — NOT started by `docker compose up`
  # (that runs the lightweight ved-zgw-mock instead). Self-contained: its own PostGIS DB
  # + Redis + OpenZaak web + one Celery worker. Notifications are disabled, so no Open
  # Notificaties is needed. Provisioning (a `valtimo` API client + a published
  # catalogus/zaaktype/informatieobjecttype) runs once via ved-openzaak-init.
  #
  # Bring up with:  docker compose stop ved-zgw-mock   # free :8002
  #                 docker compose --profile openzaak up -d
  #
  # OpenZaak publishes amd64 images only → native on amd64 (CI/cluster), emulated on arm64
  # (slow first boot). Valtimo (host Gradle bootRun) reaches it at http://localhost:8002,
  # matching SITE_DOMAIN so returned resource URLs resolve.

  ved-openzaak-db:
    profiles: ["openzaak"]
    # Multi-arch PostGIS (arm64 + amd64). Dedicated to OpenZaak so the default Postgres
    # stays lean. POSTGRES_DB=openzaak; the postgis extension is enabled via db-init.
    image: imresamu/postgis:16-3.5
    container_name: ved-openzaak-db
    environment:
      POSTGRES_USER: openzaak
      POSTGRES_PASSWORD: openzaak
      POSTGRES_DB: openzaak
    volumes:
      - ved_openzaak_db_data:/var/lib/postgresql/data
      - ./openzaak/db-init:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openzaak"]
      interval: 10s
      timeout: 5s
      retries: 5

  ved-openzaak-redis:
    profiles: ["openzaak"]
    image: redis:7-alpine
    container_name: ved-openzaak-redis

  ved-openzaak-init:
    profiles: ["openzaak"]
    image: &oz-image openzaak/open-zaak:1.29.0
    # OpenZaak publishes amd64 only; runs natively on amd64 (CI/cluster), under emulation
    # on arm64 dev machines.
    platform: &oz-platform linux/amd64
    container_name: ved-openzaak-init
    environment: &oz-env
      DJANGO_SETTINGS_MODULE: openzaak.conf.docker
      SECRET_KEY: epistola-demo-not-for-production
      DB_HOST: ved-openzaak-db
      DB_PORT: "5432"
      DB_NAME: openzaak
      DB_USER: openzaak
      DB_PASSWORD: openzaak
      IS_HTTPS: "no"
      SITE_DOMAIN: localhost:8002
      ALLOWED_HOSTS: localhost,127.0.0.1,ved-openzaak
      CORS_ALLOW_ALL_ORIGINS: "True"
      CACHE_DEFAULT: ved-openzaak-redis:6379/0
      CACHE_AXES: ved-openzaak-redis:6379/0
      CELERY_BROKER_URL: redis://ved-openzaak-redis:6379/1
      CELERY_RESULT_BACKEND: redis://ved-openzaak-redis:6379/1
      OPENZAAK_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin
      OPENZAAK_SUPERUSER_EMAIL: admin@localhost
      DISABLE_2FA: "true"
      NOTIFICATIONS_DISABLED: "true"
      LOG_NOTIFICATIONS_IN_DB: "no"
      ENVIRONMENT: dev
      DB_CONN_MAX_AGE: "0"
      SENDFILE_BACKEND: django_sendfile.backends.development
      RUN_SETUP_CONFIG: "true"
    command:
      - sh
      - -c
      - "/setup_configuration.sh && src/manage.py loaddata /app/fixtures/catalogi.json"
    volumes:
      - ./openzaak/setup_configuration:/app/setup_configuration:z
      - ./openzaak/fixtures/catalogi.json:/app/fixtures/catalogi.json:z
    depends_on:
      ved-openzaak-db:
        condition: service_healthy
      ved-openzaak-redis:
        condition: service_started

  ved-openzaak:
    profiles: ["openzaak"]
    image: *oz-image
    platform: *oz-platform
    container_name: ved-openzaak
    environment: *oz-env
    ports:
      - "8002:8000"
    volumes:
      - ved_openzaak_media:/app/media
      - ved_openzaak_private_media:/app/private-media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests,sys; sys.exit(requests.head('http://localhost:8000/admin/').status_code not in (200,302))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      ved-openzaak-init:
        condition: service_completed_successfully

  ved-openzaak-celery:
    profiles: ["openzaak"]
    image: *oz-image
    platform: *oz-platform
    container_name: ved-openzaak-celery
    environment: *oz-env
    command: /celery_worker.sh
    volumes:
      - ved_openzaak_media:/app/media
      - ved_openzaak_private_media:/app/private-media
    depends_on:
      ved-openzaak:
        condition: service_healthy

volumes:
  ved_postgres_data:
  ved_openzaak_db_data:
  ved_openzaak_media:
  ved_openzaak_private_media:
