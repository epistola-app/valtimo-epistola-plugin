packages:
  - frontend/plugin
  - test-app/frontend

overrides:
  "@angular/common": 19.2.25
  "@angular/compiler": 19.2.25
  "@angular/core": 19.2.25
  "ajv@>=8": ">=8.18.0"
  axios: ">=1.18.1"
  "brace-expansion@<2": 1.1.16
  "brace-expansion@>=2": ">=5.0.7"
  devalue: ">=5.8.2"
  dompurify: ">=3.4.12"
  "fast-uri@>=3 <4": ">=3.1.4"
  "fast-uri@>=4": ">=4.1.1"
  follow-redirects: ">=1.16.0"
  form-data: ">=4.0.6"
  # swagger-ui (test-app) still pulls immutable@3; no 3.x fix for CVE-2026-59879/59880.
  # 4.3.9 is API-compatible enough for react-immutable-* / redux-immutable used there.
  immutable: 4.3.9
  "js-yaml@>=4": ">=4.3.0"
  jsonata: ">=2.2.2"
  lodash: ">=4.18.1"
  lodash-es: ">=4.18.1"
  morgan: ">=1.11.0"
  prismjs: ">=1.30.0"
  protocol-buffers-schema: ">=3.6.1"
  qs: ">=6.15.3"
  svelte: ">=5.55.7"
  "uuid@>=11 <12": ">=11.1.1"

allowBuilds:
  "@carbon/charts": true
  "@carbon/colors": true
  "@carbon/feature-flags": true
  "@carbon/grid": true
  "@carbon/icons": true
  "@carbon/layout": true
  "@carbon/motion": true
  "@carbon/styles": true
  "@carbon/themes": true
  "@carbon/type": true
  "@carbon/utils-position": true
  "@parcel/watcher": true
  "@scarf/scarf": true
  "@tree-sitter-grammars/tree-sitter-yaml": true
  carbon-components-angular: true
  core-js: true
  core-js-pure: true
  esbuild: true
  inferno: true
  less: true
  lmdb: true
  msgpackr-extract: true
  tree-sitter: true
  tree-sitter-json: true
  unrs-resolver: true
