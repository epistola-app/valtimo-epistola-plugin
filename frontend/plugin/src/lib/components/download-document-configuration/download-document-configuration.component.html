<v-form (valueChange)="formValueChange($event)" *ngIf="prefillResolved$ | async">
  <v-input
    name="documentVariable"
    [title]="'documentVariable' | pluginTranslate: pluginId | async"
    [tooltip]="'documentVariableTooltip' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="resolvedPrefill?.documentVariable"
    [disabled]="safeDisabled$ | async"
    [required]="true"
  >
  </v-input>

  <v-input
    name="contentVariable"
    [title]="'contentVariable' | pluginTranslate: pluginId | async"
    [tooltip]="'contentVariableTooltip' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="resolvedPrefill?.contentVariable"
    [disabled]="safeDisabled$ | async"
    [required]="true"
  >
  </v-input>
</v-form>
