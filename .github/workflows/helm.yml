name: Helm Chart

on:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to release (e.g. 0.3.0). Required for manual runs.'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  CHART_NAME: valtimo-demo
  CHART_PATH: charts/valtimo-demo

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Build chart dependencies
        run: helm dependency build ${{ env.CHART_PATH }}

      - name: Lint Helm chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Scan Helm chart for misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: ${{ env.CHART_PATH }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  version:
    name: Resolve version
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            # Only process chart-* tags
            if [[ "$TAG_NAME" != chart-* ]]; then
              echo "::notice::Skipping non-chart release tag: ${TAG_NAME}"
              echo "version=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            VERSION="${TAG_NAME#chart-}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${VERSION}"

  release:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.version != ''
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Update Chart.yaml version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" ${{ env.CHART_PATH }}/Chart.yaml

          # Sync appVersion with latest app release tag
          APP_VERSION=$(git tag -l "v*" --sort=-v:refname | head -n 1 | sed 's/^v//')
          if [ -n "$APP_VERSION" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" ${{ env.CHART_PATH }}/Chart.yaml
          fi

          echo "Updated Chart.yaml:"
          cat ${{ env.CHART_PATH }}/Chart.yaml

      - name: Build chart dependencies
        run: helm dependency build ${{ env.CHART_PATH }}

      - name: Lint Helm chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package ${{ env.CHART_PATH }} --destination .helm-packages

      - name: Push Helm chart to OCI registry
        run: |
          helm push .helm-packages/${{ env.CHART_NAME }}-${{ needs.version.outputs.version }}.tgz oci://ghcr.io/epistola-app/charts

      - name: Update GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release edit "chart-${VERSION}" \
            --repo "${{ github.repository }}" \
            --notes "$(cat <<EOF
          ## Helm Chart ${VERSION}

          ### Installation
          \`\`\`bash
          helm install valtimo-demo oci://ghcr.io/epistola-app/charts/${{ env.CHART_NAME }} --version ${VERSION}
          \`\`\`

          ### Upgrade
          \`\`\`bash
          helm upgrade valtimo-demo oci://ghcr.io/epistola-app/charts/${{ env.CHART_NAME }} --version ${VERSION}
          \`\`\`
          EOF
          )"

      - name: Upload chart package to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release upload "chart-${VERSION}" \
            ".helm-packages/${{ env.CHART_NAME }}-${VERSION}.tgz" \
            --repo "${{ github.repository }}" \
            --clobber
