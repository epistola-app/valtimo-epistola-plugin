name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.1). Required for re-runs.'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

env:
  VERSION: ""

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            VERSION="${TAG_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi

          MAJOR_MINOR="${VERSION%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

  build:
    name: Build & Test
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & test backend plugin
        run: ./gradlew :backend:plugin:build -Pversion=${{ needs.version.outputs.version }}

      - name: Build frontend plugin
        run: pnpm --filter @epistola.app/valtimo-plugin build

  publish-backend:
    name: Publish Backend to Maven Central
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        run: ./gradlew :backend:plugin:publishAndReleaseToMavenCentral -Pversion=${{ needs.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

  publish-frontend:
    name: Publish Frontend to npm
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm --filter @epistola.app/valtimo-plugin build

      - name: Set version and publish
        working-directory: frontend/plugin/dist
        run: |
          npm version "${{ needs.version.outputs.version }}" --no-git-tag-version
          npm publish --provenance --access public

  docker-backend:
    name: Docker Backend
    needs: [version, publish-backend]
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/epistola-app/valtimo/demo-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build WAR
        run: ./gradlew :test-app:backend:bootWar -Pversion=${{ needs.version.outputs.version }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: test-app/backend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE }}:${{ needs.version.outputs.major_minor }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"

  docker-frontend:
    name: Docker Frontend
    needs: [version, publish-frontend]
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/epistola-app/valtimo/demo-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm --filter @epistola.app/valtimo-plugin build

      - name: Build test-app
        run: pnpm --filter gzac-frontend-template build

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: test-app/frontend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE }}:${{ needs.version.outputs.major_minor }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"

  update-release:
    name: Update GitHub Release
    needs: [version, docker-backend, docker-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Update release body with install instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release edit "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --notes "$(cat <<EOF
          ## v${VERSION}

          ### Maven (backend plugin)
          \`\`\`xml
          <dependency>
              <groupId>app.epistola.valtimo</groupId>
              <artifactId>epistola-plugin</artifactId>
              <version>${VERSION}</version>
          </dependency>
          \`\`\`

          ### Gradle (Kotlin DSL)
          \`\`\`kotlin
          implementation("app.epistola.valtimo:epistola-plugin:${VERSION}")
          \`\`\`

          ### npm (frontend plugin)
          \`\`\`bash
          npm install @epistola.app/valtimo-plugin@${VERSION}
          \`\`\`

          ### Docker images
          \`\`\`
          ghcr.io/epistola-app/valtimo/demo-backend:${VERSION}
          ghcr.io/epistola-app/valtimo/demo-frontend:${VERSION}
          \`\`\`
          EOF
          )"
