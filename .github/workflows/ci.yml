name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check contract version
        if: github.event_name == 'pull_request'
        run: |
          VERSION=$(grep 'epistola-client\s*=' gradle/libs.versions.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Contract version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT* ]] || [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "::warning::Contract version '$VERSION' is a snapshot/feature-stamped version. Update to a released version before merging."
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :backend:plugin:build

      - name: Build test-app (compile only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :test-app:backend:build -x test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/plugin/build/reports/tests/
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm --filter @epistola.app/valtimo-plugin build

      - name: Build test-app
        run: pnpm --filter gzac-frontend-template build
