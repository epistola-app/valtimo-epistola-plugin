name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check contract version
        if: github.event_name == 'pull_request'
        run: |
          VERSION=$(grep 'epistola-client\s*=' gradle/libs.versions.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Contract version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT* ]] || [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "::warning::Contract version '$VERSION' is a snapshot/feature-stamped version. Update to a released version before merging."
          fi

      - uses: jdx/mise-action@v2

      - uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :backend:plugin:build

      - name: Build test-app (compile only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :test-app:backend:build -x test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/plugin/build/reports/tests/
          retention-days: 7

  e2e-backend:
    name: Backend E2E (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: gradle/actions/setup-gradle@v4

      # Boots the real test-app against Testcontainers Postgres + Keycloak (Docker is
      # available on GitHub-hosted runners). Epistola itself is mocked, so no external
      # service is needed. The Playwright UI E2E suites still require a full running stack
      # and are run locally / planned as a separate nightly workflow.
      - name: Run test-app backend E2E
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :test-app:backend:test

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-test-results
          path: test-app/backend/build/reports/tests/
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Check format
        run: pnpm format:check

      - name: Check license headers
        run: pnpm headers:check

      - name: Type-check (strict)
        run: pnpm typecheck

      - name: Check frontend runtime singletons
        run: pnpm singletons:check

      - name: Test plugin
        run: pnpm --filter @epistola.app/valtimo-plugin test

      - name: Build plugin
        run: pnpm --filter @epistola.app/valtimo-plugin build

      - name: Build test-app
        run: pnpm --filter gzac-frontend-template build

  security-fs:
    name: Security FS scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
